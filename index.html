<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viking Cloud Workspace Platform</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  
  <style>
    :root, body.theme-light { 
      --bg-color: #f4f5f7; --panel-bg: #ffffff; --card-bg: #ffffff; --text-main: #000000; --text-muted: #5e6c84; --primary-btn: #0052cc; --primary-hover: #0047b3; --border-color: #dfe1e6; --hover-bg: #ebecf0; --input-bg: #ffffff; --danger-btn: #dc3545; --toolbar-bg: #f9fafc; 
      --sidebar-bg: #0f172a; --topbar-bg: #ffffff; --main-bg: #f8fafc; --accent: #2563eb; --text: #000000; --sidebar-text: #f8fafc; --border: #cbd5e1;
    }
    body.theme-dark { 
      --bg-color: #121212; --panel-bg: #1e1e1e; --card-bg: #242424; --text-main: #e0e0e0; --text-muted: #a0a0a0; --primary-btn: #bb86fc; --primary-hover: #9965f4; --border-color: #333333; --hover-bg: #333333; --input-bg: #2c2c2c; --danger-btn: #cf6679; --toolbar-bg: #1a1a1a; 
      --sidebar-bg: #020617; --topbar-bg: #1e293b; --main-bg: #0f172a; --text: #f8fafc; --border: #475569; --sidebar-text: #f8fafc; --accent: #bb86fc;
    }
    /* ... (Yellow, Blue, Beige themes omitted for brevity, ensure you keep your previous CSS variables here) ... */

    body { margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden; transition: background-color 0.3s, color 0.3s; background: var(--bg-color); color: var(--text-main); user-select: none; -webkit-user-select: none; }
    .app-container { display: none; width: 100%; height: 100vh; flex-direction: row; }
    .app-container.active { display: flex; }
    .dashboard-btn { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: 0.2s; white-space: nowrap; }
    .dashboard-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .theme-toggle-btn { background: transparent; border: 1px solid var(--border-color); cursor: pointer; font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 20px; color: var(--text-main); transition: 0.2s; white-space: nowrap; }
    .theme-toggle-btn:hover { background-color: var(--hover-bg); }

    .burger-btn { background: transparent; border: none; color: inherit; cursor: pointer; padding: 6px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .burger-btn:hover { background: rgba(128, 128, 128, 0.2); }
    .main-burger { display: none; color: var(--text-main); }
    .topbar-app-title { display: none; white-space: nowrap; color: var(--text-main); margin: 0; font-size: 1.3rem; }
    
    .app-container.sidebar-hidden aside { display: none !important; }
    .app-container.sidebar-hidden .main-burger { display: flex !important; }
    .app-container.sidebar-hidden .topbar-app-title { display: block; }

    /* UI Layouts */
    aside { width: 280px; background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; border-right: 1px solid var(--border); z-index: 10; }
    main { flex-grow: 1; display: flex; flex-direction: column; background: var(--main-bg); overflow: hidden; position: relative; }
    header { height: 70px; background: var(--topbar-bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; gap: 15px;}
    
    .silo-input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid var(--border-color); border-radius: 4px; box-sizing: border-box; background-color: var(--input-bg); color: var(--text-main); font-family: inherit; }
    .silo-btn { padding: 8px 16px; background-color: var(--primary-btn); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; width: 100%; margin-bottom: 8px; }
    .silo-search { flex: 1; max-width: 700px; padding: 10px 15px; border: 1px solid var(--border-color); border-radius: 20px; background-color: var(--input-bg); color: var(--text-main); font-size: 14px; outline: none; }
    
    /* Users Directory Styles */
    #users-container { display: none; padding: 40px; overflow-y: auto; max-width: 1000px; margin: 0 auto; width: 100%; }
    .user-row { display: flex; align-items: center; justify-content: space-between; background: var(--card-bg); padding: 15px 25px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 10px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; }
    .status-online { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
    .status-offline { background: #94a3b8; }
    
    /* ... (Keep your existing grid, feed, modal, and note card CSS here) ... */
    #notes-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; padding: 10px 30px 30px 30px; margin: 0 auto;}
    .note-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; height: 120px; display: flex; justify-content: center; align-items: center; text-align: center; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s; position: relative; overflow: hidden;}
    
    input, textarea, .rt-area, .note-content-display, #hub-fv-body { user-select: text; -webkit-user-select: text; }
  </style>
</head>
<body class="theme-light">

  <div id="global-login-overlay" style="position: fixed; top:0; left:0; width:100vw; height:100vh; background: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;">
      <div style="background: var(--card-bg); padding: 40px; border-radius: 12px; border: 1px solid var(--border-color); width: 400px; text-align: center;">
          <h2>Viking Cloud Workspace</h2>
          <p style="color: var(--text-muted); margin-bottom: 20px;">Please sign in to continue.</p>
          <input type="email" id="auth-email" class="silo-input" placeholder="Corporate Email">
          <input type="password" id="auth-password" class="silo-input" placeholder="Password">
          <button class="silo-btn" onclick="handleAuthLogin()">Secure Login</button>
      </div>
  </div>

  <div id="app-workspace" class="app-container">
    <aside style="padding: 30px;">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
        <button class="burger-btn" onclick="document.getElementById('app-workspace').classList.toggle('sidebar-hidden')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
        <h1 style="margin:0; font-size:1.3rem;">Viking Cloud</h1>
      </div>
      <p style="color: #94a3b8; font-size: 0.85rem; margin:0;">Dashboard</p>
      
      <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border);">
          <div id="user-display-info" style="font-size: 14px; margin-bottom: 10px; word-break: break-all;"></div>
          <button class="silo-btn" style="background: #ef4444;" onclick="handleGlobalLogout()">Logout</button>
      </div>
    </aside>

    <main>
      <header>
        <div style="display:flex; align-items:center; gap:10px;">
          <button class="burger-btn main-burger" onclick="document.getElementById('app-workspace').classList.toggle('sidebar-hidden')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
          <h2 class="topbar-app-title">Viking Cloud Workspace <span style="opacity:0.3;">|</span></h2>
          <h2 style="margin:0; font-size: 1.3rem;">Dashboard</h2>
        </div>
        <button class="theme-toggle-btn" onclick="cycleGlobalTheme()">Theme: Light</button>
      </header>

      <div id="app-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; padding: 40px;">
        <div class="app-card" onclick="switchApp('silo')"><h3>📝 Silo Notes</h3></div>
        <div class="app-card" onclick="switchApp('updates')"><h3>📣 Updates Hub</h3></div>
      </div>
    </main>
  </div>

  <div id="app-silo" class="app-container">
    <aside style="background: var(--panel-bg); color: var(--text-main);">
      <div style="padding: 20px; border-bottom: 1px solid var(--border-color); height: 70px; display: flex; align-items: center; gap: 10px;">
          <button class="burger-btn" onclick="document.getElementById('app-silo').classList.toggle('sidebar-hidden')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
          <h1 style="margin:0; font-size:1.5rem;">Silo <span id="silo-role" style="font-size:12px; color:gray;"></span></h1>
      </div>
      <div id="silo-create-section" style="padding: 15px 20px 0; display: none;">
        <button class="silo-btn" onclick="siloSetView('Create')">+ Create Note</button>
      </div>
      <div style="flex: 1; overflow-y: auto; padding: 15px 0;">
        <ul id="label-list" style="list-style: none; padding: 0; margin: 0;"></ul>
      </div>
    </aside>

    <main>
      <header style="background: var(--panel-bg);">
        <div style="display:flex; align-items:center; flex:1; gap:15px;">
          <button class="burger-btn main-burger" onclick="document.getElementById('app-silo').classList.toggle('sidebar-hidden')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
          <h2 class="topbar-app-title">Silo</h2>
          <input type="text" id="silo-search" class="silo-search" placeholder="Search notes or users..." oninput="siloSearch(event)">
        </div>
        <div style="display:flex; gap:10px;">
            <button class="dashboard-btn admin-only" style="background: var(--text-muted); display:none;" onclick="openUsersDirectory()">Users</button>
            <button class="dashboard-btn" onclick="switchApp('workspace')">Dashboard</button>
        </div>
      </header>

      <div id="silo-view-panel" style="display:none; padding: 40px; max-width: 800px; margin: auto;"></div>
      <div id="notes-container"></div>
      
      <div id="users-container">
          <h2>Platform Directory</h2>
          <div id="users-list-ui"></div>
      </div>
    </main>
  </div>

  <div id="app-updates" class="app-container">
     <aside style="background: var(--panel-bg); color: var(--text-main);">
      <div style="padding: 20px; border-bottom: 1px solid var(--border-color); height: 70px; display: flex; align-items: center; gap: 10px;">
          <button class="burger-btn" onclick="document.getElementById('app-updates').classList.toggle('sidebar-hidden')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
          <h1 style="margin:0; font-size:1.5rem;">Hub <span id="hub-role" style="font-size:12px; color:gray;"></span></h1>
      </div>
      <div style="padding: 25px;">
        <button class="silo-btn secondary" onclick="hubSwitchFolder('latest')">Latest Updates</button>
        <button class="silo-btn secondary" onclick="hubSwitchFolder('history')">Update History</button>
        <button id="hub-create-btn" class="silo-btn admin-only" style="display:none; margin-top:20px;" onclick="hubOpenEditor()">+ Create Update</button>
      </div>
    </aside>
    <main>
      <header style="background: var(--panel-bg);">
        <div style="display:flex; align-items:center; flex:1; gap:15px;">
          <button class="burger-btn main-burger" onclick="document.getElementById('app-updates').classList.toggle('sidebar-hidden')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
          <h2 class="topbar-app-title">Update Hub</h2>
          <input type="text" class="silo-search" placeholder="Search updates...">
        </div>
        <div style="display:flex; gap:10px;">
            <button class="dashboard-btn admin-only" style="background: var(--text-muted); display:none;" onclick="openUsersDirectory()">Users</button>
            <button class="dashboard-btn" onclick="switchApp('workspace')">Dashboard</button>
        </div>
      </header>
      <div id="hub-feed" style="padding: 30px;"></div>
      <div id="hub-full-view" style="display:none; padding:40px; max-width:800px; margin:auto;"></div>
    </main>
  </div>

  <script>
    const supabaseUrl = 'https://ntxjpofwldorxqbwolup.supabase.co'; 
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50eGpwb2Z3bGRvcnhxYndvbHVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODM3NzksImV4cCI6MjA5MDE1OTc3OX0.ynsDR4f9cRjjhSyLdo09YBO800dQfxInJAQFzVwXI00';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // Identity State
    let currentUser = null;
    let userRole = 'Viewer'; 
    let currentAppLocation = 'Dashboard';
    let onlineUsers = {}; // Stores presence state

    // Realtime Presence Channel
    const presenceChannel = supabaseClient.channel('workspace_presence');

    // --- AUTHENTICATION & PRESENCE LOGIC ---
    async function checkSession() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            currentUser = session.user;
            await fetchUserProfile();
            document.getElementById('global-login-overlay').style.display = 'none';
            document.getElementById('app-workspace').classList.add('active');
            
            // Start tracking presence
            setupPresence();
            loadSiloNotes(true);
        }
    }

    async function handleAuthLogin() {
      const email = document.getElementById('auth-email').value;
      const pass = document.getElementById('auth-password').value;
      if (!email || !pass) return alert("Required fields missing.");
      
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
      if (error) {
          if(error.message.includes("Email not confirmed")) alert("Please check your email to confirm your account first.");
          else alert("Login failed: " + error.message);
      } else {
          currentUser = data.user;
          await fetchUserProfile();
          document.getElementById('global-login-overlay').style.display = 'none';
          document.getElementById('app-workspace').classList.add('active');
          setupPresence();
      }
    }

    async function handleGlobalLogout() {
        presenceChannel.untrack();
        await supabaseClient.auth.signOut();
        window.location.reload();
    }

    async function fetchUserProfile() {
        const { data, error } = await supabaseClient.from('user_profiles').select('role').eq('id', currentUser.id).single();
        if (data) userRole = data.role;
        
        document.getElementById('user-display-info').innerText = `Logged in as:\n${currentUser.email}\nRole: ${userRole}`;
        document.getElementById('silo-role').innerText = userRole;
        document.getElementById('hub-role').innerText = userRole;

        // Reveal Admin UI if Editor
        if (userRole === 'Editor') {
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            document.getElementById('silo-create-section').style.display = 'block';
        }
    }

    function setupPresence() {
        presenceChannel.on('presence', { event: 'sync' }, () => {
            onlineUsers = presenceChannel.presenceState();
            renderUsersDirectory();
        });
        
        presenceChannel.subscribe(async (status) => {
            if (status === 'SUBSCRIBED') {
                await updatePresenceLocation();
            }
        });
    }

    async function updatePresenceLocation() {
        if(!currentUser) return;
        await presenceChannel.track({
            email: currentUser.email,
            role: userRole,
            location: currentAppLocation,
            online_at: new Date().toISOString(),
        });
    }

    // --- NAVIGATION & UI LOGIC ---
    function switchApp(appName) {
      document.querySelectorAll('.app-container').forEach(el => el.classList.remove('active'));
      
      // Hide users container, show normal grids
      document.getElementById('notes-container').style.display = 'grid';
      document.getElementById('users-container').style.display = 'none';

      let targetApp = appName === 'workspace' ? 'app-workspace' : `app-${appName}`;
      document.getElementById(targetApp).classList.add('active');
      
      currentAppLocation = appName === 'workspace' ? 'Dashboard' : (appName === 'silo' ? 'Silo Notes' : 'Updates Hub');
      updatePresenceLocation();
    }

    // --- USERS DIRECTORY (Admin Only) ---
    async function openUsersDirectory() {
        if (userRole !== 'Editor') return;
        
        document.getElementById('notes-container').style.display = 'none';
        document.getElementById('silo-view-panel').style.display = 'none';
        document.getElementById('hub-feed').style.display = 'none';
        document.getElementById('users-container').style.display = 'block';
        
        renderUsersDirectory();
    }

    async function renderUsersDirectory() {
        const uiList = document.getElementById('users-list-ui');
        uiList.innerHTML = '<p>Loading directory...</p>';

        // 1. Fetch ALL users from the database profile table
        const { data: allProfiles, error } = await supabaseClient.from('user_profiles').select('*');
        if (error || !allProfiles) return uiList.innerHTML = '<p>Error loading users.</p>';

        // 2. Map realtime presence data
        const activePresence = [];
        for (const key in onlineUsers) {
            activePresence.push(onlineUsers[key][0]); // Get the latest presence object for the user
        }

        uiList.innerHTML = '';
        const searchQuery = document.getElementById('silo-search')?.value.toLowerCase() || '';

        allProfiles.forEach(profile => {
            if (!profile.email.toLowerCase().includes(searchQuery)) return;

            // Check if this database user is currently in the active presence array
            const presenceData = activePresence.find(p => p.email === profile.email);
            const isOnline = !!presenceData;
            
            const dotClass = isOnline ? 'status-online' : 'status-offline';
            const locationText = isOnline ? `Viewing: ${presenceData.location}` : 'Offline';

            uiList.innerHTML += `
                <div class="user-row">
                    <div>
                        <div style="font-weight: 600; margin-bottom: 4px;">
                            <span class="status-dot ${dotClass}"></span>
                            ${profile.email}
                        </div>
                        <div style="font-size: 13px; color: var(--text-muted);">
                            Role: ${profile.role}
                        </div>
                    </div>
                    <div style="text-align:right; font-size: 13px; color: var(--text-muted);">
                        ${locationText}
                    </div>
                </div>
            `;
        });
    }

    // Overwrite standard search to also filter users if directory is open
    function siloSearch(e) { 
        if (document.getElementById('users-container').style.display === 'block') {
            renderUsersDirectory();
        } else {
            // (Your normal Silo search logic here)
        }
    }

    // Theme logic
    const themes = ['light', 'dark', 'blue', 'yellow', 'beige'];
    let globalThemeIdx = 0;
    function cycleGlobalTheme() {
      document.body.className = `theme-${themes[++globalThemeIdx % themes.length]}`;
    }

    // Initialize application security
    window.onload = checkSession;

  </script>
</body>
</html>
